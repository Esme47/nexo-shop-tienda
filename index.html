<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NEXO Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --f: #EC4899; --fd: #DB2777; --bg: #FFF0F6; --c: #FFFFFF; --t: #111827; --tm: #6B7280; --b: #FBCFE8; --g: linear-gradient(135deg, #EC4899, #A855F7); }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--t); padding-bottom: 80px; }
    header { position: sticky; top: 0; background: var(--c); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; z-index: 50; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .logo { font-size: 22px; font-weight: 900; background: var(--g); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .cart-btn { position: relative; background: var(--bg); border: none; padding: 8px 12px; border-radius: 12px; font-size: 20px; cursor: pointer; }
    .badge { position: absolute; top: -6px; right: -6px; background: var(--f); color: white; font-size: 11px; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; }
    
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 16px; }
    .card { background: var(--c); border-radius: 14px; overflow: hidden; box-shadow: 0 4px 12px rgba(236,72,153,0.1); border: 2px solid var(--b); cursor: pointer; transition: transform 0.2s; }
    .card:active { transform: scale(0.98); }
    .card img { width: 100%; height: 150px; object-fit: cover; }
    .card-body { padding: 10px; }
    .card-title { font-size: 13px; font-weight: 700; margin: 0 0 6px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .price { font-size: 16px; font-weight: 900; color: var(--fd); }
    .original { font-size: 11px; color: var(--tm); text-decoration: line-through; margin-left: 6px; }
    .discount { position: absolute; top: 8px; left: 8px; background: var(--g); color: white; font-size: 10px; font-weight: 800; padding: 3px 6px; border-radius: 6px; }
    
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; backdrop-filter: blur(3px); }
    .modal.active { display: flex; }
    .modal-content { background: var(--c); width: 100%; border-radius: 20px 20px 0 0; padding: 20px 16px 30px; max-height: 85vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .close-btn { background: var(--bg); border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 18px; cursor: pointer; }
    
    .cart-item { background: var(--bg); padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .qty-ctrl { display: flex; align-items: center; gap: 8px; }
    .qty-btn { width: 28px; height: 28px; background: var(--c); border: 1px solid var(--b); border-radius: 6px; font-weight: 700; cursor: pointer; }
    .total-bar { font-size: 20px; font-weight: 900; text-align: right; margin: 16px 0; }
    .btn { width: 100%; background: var(--g); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 800; font-size: 15px; cursor: pointer; box-shadow: 0 4px 10px rgba(236,72,153,0.3); }
    .loading { text-align: center; padding: 40px; color: var(--tm); grid-column: 1/-1; }
    .nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--c); display: flex; justify-content: space-around; padding: 10px 0 14px; border-top: 2px solid var(--b); z-index: 60; }
    .nav-item { font-size: 11px; font-weight: 700; color: var(--tm); text-decoration: none; }
    .nav-item.active { color: var(--f); }
  </style>
</head>
<body>
  <header>
    <div class="logo">NEXO Shop</div>
    <button class="cart-btn" onclick="toggleCart()"> <span class="badge" id="cartBadge">0</span></button>
  </header>
  <main class="grid" id="productGrid">
    <div class="loading">Cargando productos...</div>
  </main>

  <div class="modal" id="cartModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 style="margin:0">Tu Carrito</h2>
        <button class="close-btn" onclick="toggleCart()">✕</button>
      </div>
      <div id="cartItems"></div>
      <div id="cartEmpty" class="loading" style="display:none">El carrito está vacío </div>
      <div class="total-bar" id="cartTotal"></div>
      <button class="btn" onclick="checkout()">Finalizar Compra</button>
    </div>
  </div>

  <nav class="nav">
    <a class="nav-item active">🏠 Inicio</a>
    <a class="nav-item" onclick="alert('Próximamente')">🧭 Categorías</a>
    <a class="nav-item" onclick="toggleCart()"> Carrito</a>
  </nav>

  <script>
    // 🔑 PEGA AQUÍ TUS DATOS DE SUPABASE
    const SUPABASE_URL = 'https://TU_PROYECTO.supabase.co';
    const SUPABASE_KEY = 'TU_CLAVE_ANON_AQUI';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let cart = JSON.parse(localStorage.getItem('nexo_cart')) || [];
    let products = [];

    async function loadProducts() {
      try {
        const { data, error } = await supabase.from('products').select('*').order('created_at', { ascending: false });
        if (error) throw error;
        products = data || [];
        renderGrid();
      } catch (e) {
        document.getElementById('productGrid').innerHTML = `<div class="loading">Error: ${e.message}. Verifica las claves y la tabla 'products' en Supabase.</div>`;
      }
    }

    function renderGrid() {
      const grid = document.getElementById('productGrid');
      if (!products.length) return grid.innerHTML = '<div class="loading">No hay productos. Agrega datos en Supabase.</div>';
      
      grid.innerHTML = products.map(p => {
        const disc = p.original_price ? Math.round(((p.original_price - p.price)/p.original_price)*100) : 0;
        return `          <div class="card" onclick="addToCartById(${p.id})">
            <div style="position:relative">
              <img src="${p.image || 'https://via.placeholder.com/300'}" alt="${p.title}" loading="lazy">
              ${disc > 0 ? `<span class="discount">-${disc}%</span>` : ''}
            </div>
            <div class="card-body">
              <p class="card-title">${p.title}</p>
              <div>
                <span class="price">$${p.price.toLocaleString('es-CO')}</span>
                ${p.original_price ? `<span class="original">$${p.original_price.toLocaleString('es-CO')}</span>` : ''}
              </div>
            </div>
          </div>
        `;
      }).join('');
      updateBadge();
    }

    function addToCartById(id) {
      const prod = products.find(p => p.id === id);
      if (!prod) return;
      const exist = cart.find(i => i.id === id);
      if (exist) exist.qty++; else cart.push({ ...prod, qty: 1 });
      localStorage.setItem('nexo_cart', JSON.stringify(cart));
      updateBadge();
      toggleCart();
    }

    function renderCart() {
      const container = document.getElementById('cartItems');
      const empty = document.getElementById('cartEmpty');
      const totalEl = document.getElementById('cartTotal');
      container.innerHTML = '';
      if (!cart.length) { empty.style.display = 'block'; totalEl.textContent = ''; return; }
      empty.style.display = 'none';
      let total = 0;
      cart.forEach((item, i) => {
        total += item.price * item.qty;
        container.innerHTML += `
          <div class="cart-item">
            <div>
              <div style="font-weight:700">${item.title}</div>
              <div style="color:var(--fd);font-weight:800">$${(item.price*item.qty).toLocaleString('es-CO')}</div>
            </div>
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
              <span style="font-weight:700;width:20px;text-align:center">${item.qty}</span>
              <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
            </div>
          </div>        `;
      });
      totalEl.textContent = `Total: $${total.toLocaleString('es-CO')}`;
    }

    function changeQty(i, d) {
      cart[i].qty += d;
      if (cart[i].qty <= 0) cart.splice(i, 1);
      localStorage.setItem('nexo_cart', JSON.stringify(cart));
      updateBadge();
      renderCart();
    }

    function updateBadge() {
      document.getElementById('cartBadge').textContent = cart.reduce((s, i) => s + i.qty, 0);
    }

    function toggleCart() {
      document.getElementById('cartModal').classList.toggle('active');
      renderCart();
    }

    function checkout() {
      if (!cart.length) return alert('Agrega productos primero');
      alert(' ¡Pedido registrado!\n\nEn el siguiente paso conectaremos MercadoPago/Wompi para cobros reales.');
      cart = [];
      localStorage.removeItem('nexo_cart');
      updateBadge();
      toggleCart();
    }

    loadProducts();
  </script>
</body>
</html>
